name: manually release

on:
  workflow_dispatch:
    inputs:
      kubernetes_version:
        description: 'version of Kubernetes Python client'
      version_suffix:
        description: 'version suffix'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: |
          bash scripts/manually-release.sh "${{ inputs.kubernetes_version }}" "${{ inputs.version_suffix }}"
      - name: check packages
        id: check_packages
        uses: andstor/file-existence-action@v3
        with:
          files: "dist/*.whl"
      - uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.check_packages.outputs.files_exists == 'true'
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
